  <body>
    <div id="root">
      <div id="pre-react-fallback" style="display:none;position:fixed;inset:0;background:#0f1712;color:#e8f5e9;font-family:system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px;text-align:center;z-index:9999;">
        <div style="font-size:40px;">⚠️</div>
        <div>
          <p style="font-size:18px;font-weight:bold;margin:0 0 8px;">حدث خطأ أثناء التحميل</p>
          <p style="font-size:14px;color:#a5d6a7;margin:0;">يرجى إعادة تحميل الصفحة</p>
        </div>
        <button onclick="window.location.reload()" style="margin-top:8px;padding:10px 24px;border-radius:8px;background:#3d7a5a;color:white;border:none;font-size:14px;font-weight:600;cursor:pointer;">إعادة التحميل</button>
      </div>
    </div>
    <script>
      window.addEventListener('error', function(e) {
        var fb = document.getElementById('pre-react-fallback');
        var root = document.getElementById('root');
        if (fb && root && root.children.length <= 1) {
          fb.style.display = 'flex';
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
