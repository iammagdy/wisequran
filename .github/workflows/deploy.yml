name: Deploy to Hostinger

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Pre-deploy gate #1: catch missing imports (e.g. lucide-react icons)
      # that TypeScript and `vite build` happily ignore but blow up at runtime.
      - name: Lint check (no-undef)
        run: pnpm run check:no-undef

      # Pre-deploy gate #2: confirm no required VITE_* vars are missing.
      # VITE_SUPABASE_* are optional — supabase.ts has graceful fallbacks and
      # the app runs fully offline without them since v3.9.1.
      - name: Verify required build-time env vars
        run: pnpm run check:build-env

      - name: Build project
        run: pnpm run build

      - name: Verify build directory exists
        run: |
          echo "Listing contents of dist directory:"
          ls -la ./dist/

      # Pre-deploy gate #3: serve the built dist/ in a headless browser and
      # confirm the React root actually renders. Catches the "blank page" class
      # of regression that a successful `vite build` cannot detect on its own.
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke-test built app
        run: pnpm run check:smoke

      - name: Sync files via SFTP to Hostinger
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          source: "dist/*"
          target: "domains/thewise.cloud/public_html/quran"
          strip_components: 1
