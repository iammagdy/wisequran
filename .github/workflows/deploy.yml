name: Deploy to Hostinger

on:
  push:
    branches:
      - main # Runs this script every time code is pushed to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Vite requires a reasonably modern version of Node

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Verify build directory exists
        run: |
          echo "Listing contents of dist directory:"
          ls -la ./dist/

      - name: Sync files via FTP to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/ # Vite outputs the compiled app to the dist folder
          server-dir: ./ # Where to upload on the server (locked to the user's /quran folder)
          dangerous-clean-slate: true # Deletes old files on the server to ensure a clean deployment
